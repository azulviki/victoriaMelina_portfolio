name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # Se ejecuta cada vez que subas cambios a la rama main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4

      - name: Install, build, and upload your site
        uses: withastro/action@v3
        # Si usás pnpm o yarn en vez de npm, la action lo detecta sola.